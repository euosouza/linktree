# https://github.com/actions/deploy-pages#usage
name: Deploy to GitHub Pages
on:
  workflow_dispatch:
  push:
    branches:
      - master
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm' # Habilita o cache nativo para acelerar o build e evitar ENOENT

      - run: corepack enable

      - name: Install dependencies
        run: npm ci # 'npm ci' é mais limpo e seguro para ambientes de CI/CD

      - name: Build Nuxt
        # Usamos 'nuxi generate' para sites estáticos no GitHub Pages
        # A flag --protocol-imports ajuda a resolver problemas de resolução de módulos
        run: npx nuxi generate --protocol-imports
        env:
          NUXT_APP_BASE_URL: /linktree/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # O Nuxt Generate coloca o site pronto na pasta .output/public
          path: ./.output/public

  # Deployment job
  deploy:
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4